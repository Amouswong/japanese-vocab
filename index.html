<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese SRS - Structured Levels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .jp-text { font-family: 'Noto Sans JP', sans-serif; }
        .scene { perspective: 1000px; width: 100%; height: 350px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card__face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1rem; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .card__face--back { background: #f8fafc; transform: rotateY(180deg); }
        .no-flip { pointer-events: auto; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-indigo-700 text-white p-4 shadow-md z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2"><i class="fas fa-torii-gate"></i> Nihongo SRS</h1>
            <nav class="flex gap-6 text-sm font-semibold">
                <button onclick="app.showPage('dashboard')" class="hover:text-indigo-200">Dashboard</button>
                <button onclick="app.showPage('list')" class="hover:text-indigo-200">Database</button>
            </nav>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto p-4">
        
        <div id="page-dashboard">
            <div class="bg-white rounded-xl p-8 shadow-sm border text-center mb-6">
                <h2 class="text-xl font-bold text-slate-500 italic mb-2">Next Review Session</h2>
                <div class="text-7xl font-bold text-indigo-600 my-4" id="due-count">0</div>
                <button onclick="app.startSession('review')" id="btn-start" class="bg-indigo-600 text-white py-3 px-12 rounded-full font-bold shadow-lg disabled:opacity-50">Start Reviews</button>
            </div>
            <div class="bg-white rounded-xl p-6 border border-slate-200 text-center">
                <h3 class="font-bold text-slate-700 mb-4">Mastery Refresh (Level 5)</h3>
                <button onclick="app.startSession('master')" id="btn-master" class="bg-indigo-50 text-indigo-700 py-2 px-8 rounded-full text-sm font-bold hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">Test 10 Mastered Words</button>
                <div class="text-xs text-slate-400 mt-2">Total Mastered: <span id="master-count">0</span></div>
            </div>
        </div>

        <div id="page-list" class="hidden space-y-6">
            <div class="bg-white rounded-xl p-8 shadow-sm border">
                <h2 class="text-xl font-bold mb-6">Add Card</h2>
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <input type="text" id="add-jp" placeholder="Japanese" class="flex-1 border border-slate-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                    <input type="text" id="add-def" placeholder="Explanation" class="flex-1 border border-slate-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                    <input type="text" id="add-pos" placeholder="POS" class="flex-1 border border-slate-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                </div>
                <button onclick="app.addSingle()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold shadow-md hover:bg-indigo-700">Add Single</button>
            </div>

            <div class="bg-white rounded-xl p-8 shadow-sm border">
                <h2 class="text-xl font-bold mb-2">Bulk Upload</h2>
                <textarea id="bulk-input" rows="3" placeholder="猫, Cat, Noun" class="w-full border border-slate-200 rounded-lg p-4 bg-slate-50 font-mono text-sm mb-4"></textarea>
                <button onclick="app.addBulk()" class="bg-slate-800 text-white px-8 py-3 rounded-lg font-bold">Import Bulk</button>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Vocab Database</h2>
                    <button onclick="app.exportJSON()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow"><i class="fas fa-save mr-1"></i> Export JSON</button>
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-input" oninput="app.renderList()" placeholder="Search..." class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm">
                    <select id="filter-level" onchange="app.renderList()" class="border border-slate-200 rounded-lg px-2 py-2 text-sm bg-white">
                        <option value="all">All Levels</option><option value="1">Level 1</option><option value="5">Level 5</option>
                    </select>
                </div>
                <div id="vocab-container" class="space-y-2"></div>
            </div>
        </div>

        <div id="page-review" class="hidden">
            <div class="flex justify-between items-center mb-4 text-xs font-bold text-slate-400">
                <span id="session-title" class="text-indigo-600 uppercase tracking-widest">Reviewing</span>
                <span id="progress-text">0/0</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-1.5 mb-8"><div id="progress-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all w-0"></div></div>

            <div class="scene">
                <div class="card" id="flashcard" onclick="app.flipCard()">
                    <div class="card__face">
                        <div class="absolute top-4 left-4 text-[10px] uppercase font-bold text-slate-300" id="ui-mode-label">Mode</div>
                        <h2 class="text-4xl font-bold text-center px-4" id="ui-front-text">...</h2>
                        <p class="text-slate-300 mt-8 text-xs">Tap to reveal Answer</p>
                    </div>
                    <div class="card__face card__face--back">
                        <div class="text-center mb-6">
                            <div class="flex items-center justify-center gap-3">
                                <h2 class="text-3xl font-bold text-indigo-700" id="ui-back-text">...</h2>
                                <button onclick="app.speak(event)" class="no-flip text-indigo-400 hover:text-indigo-600 p-2"><i class="fas fa-volume-up text-2xl"></i></button>
                            </div>
                            <p class="text-slate-500 text-sm italic mt-2" id="ui-back-pos"></p>
                        </div>
                        <div class="flex gap-4 w-full px-6 no-flip">
                            <button onclick="app.handleResult(false, event)" class="flex-1 bg-red-100 text-red-700 font-bold py-4 rounded-xl hover:bg-red-200 transition">Forgot</button>
                            <button onclick="app.handleResult(true, event)" class="flex-1 bg-green-100 text-green-700 font-bold py-4 rounded-xl hover:bg-green-200 transition">Correct</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const app = {
            data: [], queue: [], currentIndex: 0, isFlipped: false,

            async init() {
                try {
                    const resp = await fetch('./vocab.json?t=' + Date.now());
                    if (resp.ok) this.data = await resp.json();
                } catch (e) {
                    const local = localStorage.getItem('jp_srs_storage');
                    if (local) this.data = JSON.parse(local);
                }
                this.updateUI(); this.showPage('dashboard');
            },

            addSingle() {
                const jp = document.getElementById('add-jp').value.trim();
                const def = document.getElementById('add-def').value.trim();
                const pos = document.getElementById('add-pos').value.trim();
                if(!jp || !def) return;
                this.data.push({ japanese: jp, definition: def, pos: pos, stage: 1, nextReview: Date.now() });
                this.save(); this.renderList();
                document.getElementById('add-jp').value = ''; document.getElementById('add-def').value = '';
            },

            addBulk() {
                document.getElementById('bulk-input').value.trim().split('\n').forEach(line => {
                    const parts = line.split(/[,\t]+/).map(s => s.trim());
                    if(parts.length >= 2) this.data.push({ japanese: parts[0], definition: parts[1], pos: parts[2]||'', stage: 1, nextReview: Date.now() });
                });
                this.save(); this.renderList(); document.getElementById('bulk-input').value = '';
            },

            save() { localStorage.setItem('jp_srs_storage', JSON.stringify(this.data)); this.updateUI(); },

            updateUI() {
                const now = Date.now();
                const due = this.data.filter(i => (i.stage||1) < 5 && (i.nextReview||0) <= now).length;
                const mastered = this.data.filter(i => (i.stage||1) >= 5).length;
                document.getElementById('due-count').innerText = due;
                document.getElementById('master-count').innerText = mastered;
                document.getElementById('btn-start').disabled = due === 0;
            },

            showPage(id) {
                document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
                document.getElementById('page-' + id).classList.remove('hidden');
                if(id === 'list') this.renderList();
            },

            renderList() {
                const term = document.getElementById('search-input').value.toLowerCase();
                const lvl = document.getElementById('filter-level').value;
                document.getElementById('vocab-container').innerHTML = this.data.filter(i => {
                    return (i.japanese.includes(term) || (i.definition||"").toLowerCase().includes(term)) && (lvl === 'all' || (i.stage||1).toString() === lvl);
                }).map(i => `<div class="bg-white p-4 rounded-lg flex justify-between border border-slate-100 shadow-sm">
                    <div><div class="jp-text font-bold text-lg">${i.japanese}</div><div class="text-xs text-slate-500">${i.definition}</div></div>
                    <div class="flex items-center gap-4"><span class="text-[10px] font-bold px-2 py-1 rounded bg-indigo-50 text-indigo-600">STAGE ${i.stage||1}</span>
                    <button onclick="app.deleteItem(${this.data.indexOf(i)})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></div>
                </div>`).join('');
            },

            deleteItem(index) { if(confirm("Delete?")) { this.data.splice(index, 1); this.save(); this.renderList(); } },

            startSession(type) {
                const now = Date.now();
                if (type === 'review') this.queue = this.data.filter(i => (i.stage||1) < 5 && (i.nextReview||0) <= now).sort(() => 0.5 - Math.random());
                else this.queue = this.data.filter(i => (i.stage||1) >= 5).sort(() => 0.5 - Math.random()).slice(0, 10);
                if (this.queue.length === 0) return;
                this.currentIndex = 0; this.showPage('review'); this.loadCard();
            },

            loadCard() {
                this.isFlipped = false;
                const card = this.queue[this.currentIndex];
                const stage = card.stage || 1;

                const frontText = document.getElementById('ui-front-text');
                const backText = document.getElementById('ui-back-text');
                const modeLabel = document.getElementById('ui-mode-label');

                // Logic: 1, 3, 5 are Kanji Ask; 2, 4 are Meaning Ask
                if ([1, 3, 5].includes(stage)) {
                    modeLabel.innerText = "Kanji → Meaning";
                    frontText.innerText = card.japanese;
                    frontText.className = "text-5xl font-bold jp-text text-center px-4";
                    backText.innerText = card.definition || card.meaning;
                } else {
                    modeLabel.innerText = "Meaning → Kanji";
                    frontText.innerText = card.definition || card.meaning;
                    frontText.className = "text-3xl font-bold text-center px-4 italic text-slate-600";
                    backText.innerText = card.japanese;
                }

                document.getElementById('ui-back-pos').innerText = card.pos || '';
                document.getElementById('flashcard').classList.remove('is-flipped');
                document.getElementById('progress-bar').style.width = ((this.currentIndex / this.queue.length) * 100) + "%";
                document.getElementById('progress-text').innerText = `${this.currentIndex + 1} / ${this.queue.length}`;
            },

            flipCard() { if(!this.isFlipped) { this.isFlipped = true; document.getElementById('flashcard').classList.add('is-flipped'); } },

            speak(event) {
                event.stopPropagation();
                const msg = new SpeechSynthesisUtterance(this.queue[this.currentIndex].japanese);
                msg.lang = 'ja-JP'; window.speechSynthesis.speak(msg);
            },

            handleResult(correct, event) {
                event.stopPropagation();
                const cur = this.queue[this.currentIndex];
                const idx = this.data.findIndex(i => i.japanese === cur.japanese);
                if (correct) {
                    if (cur.stage < 5) {
                        this.data[idx].stage = (this.data[idx].stage || 1) + 1;
                        this.data[idx].nextReview = Date.now() + (Math.pow(2, this.data[idx].stage - 1) * 86400000);
                    }
                } else {
                    this.data[idx].stage = cur.stage >= 5 ? 4 : 1;
                    this.data[idx].nextReview = Date.now();
                }
                this.save(); this.currentIndex++;
                if (this.currentIndex >= this.queue.length) { alert("Session Complete!"); this.showPage('dashboard'); }
                else this.loadCard();
            },

            exportJSON() {
                const blob = new Blob([JSON.stringify(this.data, null, 2)], {type: 'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'vocab.json'; a.click();
            }
        };
        app.init();
    </script>
</body>
</html>
