<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字溫習系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f5f7f9;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 { margin-bottom: 1.5rem; font-size: 1.8rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            padding: 15px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .stat-box small { color: #64748b; font-size: 0.85rem; }
        .stat-box span { display: block; font-size: 1.5rem; font-weight: bold; margin-top: 5px; }

        #card {
            font-size: 2.2rem;
            margin: 2.5rem 0;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed #e2e8f0;
            border-radius: 15px;
            padding: 10px;
            transition: 0.2s;
        }

        #card:hover { border-color: var(--primary); background: #f0f7ff; }

        .definition {
            font-size: 1.3rem;
            color: #475569;
            margin-top: 15px;
            font-weight: normal;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
            margin-top: 12px;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(74,144,226,0.2); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        .hidden { display: none; }
        
        #pos-tag {
            font-size: 0.9rem;
            color: var(--primary);
            background: #eef6ff;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home">
        <h1>日本語単語</h1>
        <div class="stats-grid">
            <div class="stat-box">
                <small>待複習</small>
                <span id="due-count">0</span>
            </div>
            <div class="stat-box">
                <small>已掌握 (Mastered)</small>
                <span id="master-count">0</span>
            </div>
        </div>
        <button id="btn-start" class="btn btn-primary" onclick="app.startSession()">開始溫習</button>
    </div>

    <div id="page-quiz" class="hidden">
        <div id="pos-tag"></div>
        <div id="card" onclick="app.reveal()">
            <div id="japanese-text">載入中...</div>
            <div id="definition-text" class="definition hidden"></div>
        </div>
        <div id="quiz-controls" class="hidden">
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-danger" onclick="app.handleResult(false)">唔識</button>
                <button class="btn btn-success" onclick="app.handleResult(true)">識喇</button>
            </div>
        </div>
        <p id="hint-text" style="color: #94a3b8; font-size: 0.9rem; margin-top: 20px;">點擊卡片顯示答案</p>
    </div>
</div>

<script>
    // 1. Supabase 配置 (請確認 URL 同 Key 是否正確)
    const SUPABASE_URL = 'https://ogjzoudptzwwmpwtpaar.supabase.co/rest/v1/;
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nanpvdWRwdHp3d21wd3RwYWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjAxMzgsImV4cCI6MjA5MjIzNjEzOH0.7rpYyglHCONhrTTMwk--i-lfVxx7VyWi49MMftMqyE0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        data: [],
        queue: [],
        currentIndex: 0,
        isRevealed: false,

        async init() {
            try {
                // 重點：Table 名稱改為 'Vocab' (大寫 V)
                const { data, error } = await _supabase
                    .from('Vocab')
                    .select('*');

                if (error) throw error;

                // 數據清洗
                this.data = data.map(item => ({
                    ...item,
                    // 確保 mastered 係 Boolean
                    mastered: String(item.mastered).toLowerCase() === 'true'
                }));

                console.log("成功載入數據，總數：", this.data.length);
                this.updateUI();
            } catch (err) {
                console.error("初始化失敗:", err);
                alert("無法從 Vocab Table 讀取資料，請檢查 RLS Policy 或 Table 名稱。");
            }
        },

        updateUI() {
            const now = Date.now();
            
            // 邏輯判斷
            const dueTasks = this.data.filter(i => !i.mastered && (Number(i.nextReview) || 0) <= now);
            const masteredCount = this.data.filter(i => i.mastered === true).length;

            document.getElementById('due-count').innerText = dueTasks.length;
            document.getElementById('master-count').innerText = masteredCount;
            document.getElementById('btn-start').disabled = dueTasks.length === 0;
        },

        startSession() {
            const now = Date.now();
            // 篩選未掌握且到期嘅單字
            this.queue = this.data
                .filter(i => !i.mastered && (Number(i.nextReview) || 0) <= now)
                .sort(() => Math.random() - 0.5);

            if (this.queue.length > 0) {
                this.currentIndex = 0;
                this.showPage('quiz');
                this.loadCard();
            }
        },

        loadCard() {
            this.isRevealed = false;
            const cur = this.queue[this.currentIndex];
            document.getElementById('japanese-text').innerText = cur.japanese;
            document.getElementById('definition-text').innerText = cur.definition;
            document.getElementById('pos-tag').innerText = cur.pos || '單字';
            
            document.getElementById('definition-text').classList.add('hidden');
            document.getElementById('quiz-controls').classList.add('hidden');
            document.getElementById('hint-text').classList.remove('hidden');
        },

        reveal() {
            if (this.isRevealed) return;
            this.isRevealed = true;
            document.getElementById('definition-text').classList.remove('hidden');
            document.getElementById('quiz-controls').classList.remove('hidden');
            document.getElementById('hint-text').classList.add('hidden');
        },

        async handleResult(correct) {
            const cur = this.queue[this.currentIndex];
            
            if (correct) {
                cur.stage = (Number(cur.stage) || 0) + 1;
                if (cur.stage >= 5) cur.mastered = true;
                const days = Math.pow(2, cur.stage - 1);
                cur.nextReview = Date.now() + (days * 86400000);
            } else {
                cur.stage = 1;
                cur.mastered = false;
                cur.nextReview = Date.now();
            }

            // 更新 Supabase (同樣使用大寫 Vocab)
            await _supabase
                .from('Vocab')
                .update({ 
                    stage: cur.stage, 
                    nextReview: cur.nextReview, 
                    mastered: cur.mastered 
                })
                .eq('id', cur.id);

            this.currentIndex++;
            if (this.currentIndex < this.queue.length) {
                this.loadCard();
            } else {
                alert("今日溫習完畢！");
                this.showPage('home');
                this.init();
            }
        },

        showPage(pageId) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
        }
    };

    app.init();
</script>

</body>
</html>
