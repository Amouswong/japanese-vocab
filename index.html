<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIZEN 10.7 - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text-main: #1a1a1a; --text-sub: #999999; --accent: #000000; --correct: #00b894; --wrong: #ff7675; --line: #f2f2f2; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        
        .db-status { font-size: 0.7rem; display: flex; align-items: center; gap: 5px; color: var(--text-sub); margin-bottom: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .dot.online { background: #00b894; box-shadow: 0 0 5px #00b894; }
        .dot.offline { background: #ff7675; }

        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--line); margin-bottom: 20px; }
        .logo { font-weight: 700; letter-spacing: 3px; font-size: 1.2rem; }
        .nav-links button { background: none; border: none; font-size: 1rem; cursor: pointer; margin-left: 15px; color: var(--text-sub); }
        .nav-links button.active { color: var(--accent); font-weight: 700; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fafafa; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--line); }
        .stat-card b { font-size: 1.8rem; }

        .timer-wrapper { width: 100%; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 30px; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        
        .quiz-container { text-align: center; margin-bottom: 40px; }
        #q-text { font-size: 3.2rem; font-weight: 700; margin: 0; }
        
        .mc-grid { display: grid; gap: 12px; }
        .mc-btn { background: #ffffff; border: 2px solid var(--line); padding: 18px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; text-align: center; }
        .mc-btn.correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .mc-btn.wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }

        .btn-main { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-sm { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--line); background: white; cursor: pointer; font-size: 0.8rem; }
        .btn-save { background: var(--accent); color: white; border: none; }

        .list-item { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; background: white; }
        .edit-mode { flex-direction: column; align-items: flex-start; gap: 10px; }
        .edit-input { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px; box-sizing: border-box; }

        .hidden { display: none !important; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

<div class="container">
    <div class="db-status"><div id="status-dot" class="dot"></div> <span id="status-text">連接中...</span></div>
    
    <div class="nav-header">
        <div class="logo">改善 KAIZEN</div>
        <div class="nav-links">
            <button id="nav-study" class="active" onclick="app.showPage('home')">学習</button>
            <button id="nav-db" onclick="app.showPage('db')">単語帳</button>
        </div>
    </div>

    <div id="page-home">
        <div class="stats-grid">
            <div class="stat-card"><small>復習待ち</small><b id="due-count">0</b></div>
            <div class="stat-card"><small>習得済み</small><b id="master-count">0</b></div>
        </div>
        <button class="btn-main" onclick="app.startSession(false)">学習を開始する</button>
        <button onclick="app.startSession(true)" style="background:none; border:none; color:var(--text-sub); width:100%; cursor:pointer; margin-top:10px;">習得済みから10問復習</button>
    </div>

    <div id="page-quiz" class="hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; color:var(--text-sub);">
            <span id="quiz-progress">0 / 0</span>
            <span onclick="location.reload()" style="cursor:pointer;">終了</span>
        </div>
        <div class="timer-wrapper"><div id="timer-bar"></div></div>
        <div class="quiz-container">
            <h1 id="q-text">---</h1>
            <div id="q-sub">正しい意味を選択してください</div>
        </div>
        <div id="ans-mc-area" class="mc-grid"></div>
        <button id="next-btn" class="btn-main hidden" style="margin-top:20px;" onclick="app.nextCard()">次へ</button>
    </div>

    <div id="page-db" class="hidden">
        <div style="background:#fafafa; padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid var(--line);">
            <h4 style="margin:0 0 10px 0;">一括インポート</h4>
            <textarea id="import-input" placeholder="漢字,読み,意味 (1行に1語)"></textarea>
            <button class="btn-main" style="padding:12px; margin:0;" onclick="app.bulkImport()">追加する</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="db-search" placeholder="検索..." style="flex:1; padding:12px; border:1px solid var(--line); border-radius:10px;" oninput="app.renderList()">
        </div>
        <div id="db-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ogjzoudptzwwmpwtpaar.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nanpvdWRwdHp3d21wd3RwYWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjAxMzgsImV4cCI6MjA5MjIzNjEzOH0.7rpYyglHCONhrTTMwk--i-lfVxx7VyWi49MMftMqyE0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        data: [], queue: [], currentIndex: 0, isAnswered: false, timer: null, timeLeft: 100,

        async init() {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');

            try {
                // 修復位：拎走咗 .order('created_at')
                const { data, error } = await _supabase.from('vocab').select('*');
                
                if (error) throw error;

                this.data = data || [];
                dot.className = "dot online";
                txt.innerText = "Online";
                this.updateStats();
            } catch (err) {
                dot.className = "dot offline";
                txt.innerText = "Error: " + err.message;
                console.error("Database Connection Failed:", err);
            }
        },

        updateStats() {
            const now = new Date();
            const due = this.data.filter(i => !i.mastered && (!i.nextReview || new Date(i.nextReview) <= now));
            const master = this.data.filter(i => i.mastered);
            document.getElementById('due-count').innerText = due.length;
            document.getElementById('master-count').innerText = master.length;
        },

        async bulkImport() {
            const input = document.getElementById('import-input');
            const lines = input.value.trim().split('\n').filter(l => l.includes(','));
            if (!lines.length) return alert("形式：漢字,読み,意味");

            const newItems = lines.map(l => {
                const parts = l.split(',');
                return { 
                    kanji: parts[0]?.trim() || "", 
                    "Hiragana/Katakana": parts[1]?.trim() || "", 
                    definition: parts[2]?.trim() || "", 
                    stage: 1, mastered: false 
                };
            });

            const { error } = await _supabase.from('vocab').insert(newItems);
            if (error) alert("Error: " + error.message);
            else { input.value = ""; await this.init(); this.renderList(); alert("追加完了"); }
        },

        startSession(isMasteredOnly) {
            const now = new Date();
            this.queue = isMasteredOnly ? 
                this.data.filter(i => i.mastered).sort(() => Math.random() - 0.5).slice(0, 10) :
                this.data.filter(i => !i.mastered && (!i.nextReview || new Date(i.nextReview) <= now)).sort(() => Math.random() - 0.5);
            
            if (!this.queue.length) return alert("対象の単語がありません。");
            this.currentIndex = 0;
            this.showPage('quiz');
            this.loadCard();
        },

        loadCard() {
            this.isAnswered = false;
            const item = this.queue[this.currentIndex];
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('quiz-progress').innerText = `${this.currentIndex + 1} / ${this.queue.length}`;
            document.getElementById('q-text').innerText = item.kanji || item["Hiragana/Katakana"];
            
            const correct = (item.definition || "").trim();
            const dists = [...new Set(this.data.map(d => (d.definition || "").trim()))].filter(v => v !== correct && v !== "");
            const choices = dists.sort(() => Math.random() - 0.5).slice(0, 3);
            choices.push(correct);
            choices.sort(() => Math.random() - 0.5);

            const area = document.getElementById('ans-mc-area');
            area.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'mc-btn';
                btn.innerText = c;
                btn.onclick = () => this.check(c, btn, correct);
                area.appendChild(btn);
            });
            this.startTimer();
        },

        startTimer() {
            clearInterval(this.timer);
            this.timeLeft = 100;
            const bar = document.getElementById('timer-bar');
            this.timer = setInterval(() => {
                this.timeLeft -= 1.2;
                bar.style.width = this.timeLeft + "%";
                if (this.timeLeft <= 0) { clearInterval(this.timer); if (!this.isAnswered) this.check('', null, this.queue[this.currentIndex].definition); }
            }, 100);
        },

        check(u, btn, correct) {
            if (this.isAnswered) return;
            this.isAnswered = true;
            clearInterval(this.timer);
            const isCorrect = u === correct;
            if (isCorrect) {
                if(btn) btn.classList.add('correct');
                this.updateDB(true);
            } else {
                if(btn) btn.classList.add('wrong');
                document.querySelectorAll('.mc-btn').forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
                this.updateDB(false);
            }
            document.getElementById('next-btn').classList.remove('hidden');
        },

        async updateDB(isCorrect) {
            const item = this.queue[this.currentIndex];
            let newStage = isCorrect ? (item.stage || 1) + 1 : 1;
            let nextDate = new Date();
            if (isCorrect) nextDate.setDate(nextDate.getDate() + (newStage * 2));
            await _supabase.from('vocab').update({ stage: newStage, mastered: newStage >= 5, nextReview: nextDate.toISOString() }).eq('id', item.id);
        },

        nextCard() {
            this.currentIndex++;
            if (this.currentIndex < this.queue.length) this.loadCard();
            else location.reload();
        },

        renderList() {
            const term = document.getElementById('db-search').value.toLowerCase();
            const list = document.getElementById('db-list');
            const filtered = this.data.filter(i => (i.kanji + i["Hiragana/Katakana"] + i.definition).toLowerCase().includes(term));
            
            list.innerHTML = filtered.map(i => `
                <div class="list-item" id="row-${i.id}">
                    <div>
                        <b>${i.kanji || i["Hiragana/Katakana"]}</b><br>
                        <small style="color:var(--text-sub)">${i.definition} (Lv.${i.stage})</small>
                    </div>
                    <button class="btn-sm" onclick="app.editMode(${i.id})">編集</button>
                </div>
            `).join('');
        },

        editMode(id) {
            const item = this.data.find(i => i.id === id);
            const row = document.getElementById(`row-${id}`);
            row.className = "list-item edit-mode";
            row.innerHTML = `
                <input type="text" id="ed-k-${id}" class="edit-input" value="${item.kanji || ''}" placeholder="漢字">
                <input type="text" id="ed-r-${id}" class="edit-input" value="${item["Hiragana/Katakana"] || ''}" placeholder="読み">
                <input type="text" id="ed-d-${id}" class="edit-input" value="${item.definition || ''}" placeholder="意味">
                <div style="display:flex; gap:10px;">
                    <button class="btn-sm btn-save" onclick="app.saveEdit(${id})">保存</button>
                    <button class="btn-sm" onclick="app.renderList()">取消</button>
                    <button class="btn-sm" style="color:red; border-color:red;" onclick="app.deleteItem(${id})">削除</button>
                </div>
            `;
        },

        async saveEdit(id) {
            const k = document.getElementById(`ed-k-${id}`).value;
            const r = document.getElementById(`ed-r-${id}`).value;
            const d = document.getElementById(`ed-d-${id}`).value;

            const { error } = await _supabase.from('vocab').update({
                kanji: k, "Hiragana/Katakana": r, definition: d
            }).eq('id', id);

            if (!error) { await this.init(); this.renderList(); }
        },

        async deleteItem(id) {
            if (confirm("削除しますか？")) {
                const { error } = await _supabase.from('vocab').delete().eq('id', id);
                if (!error) { await this.init(); this.renderList(); }
            }
        },

        showPage(id) {
            ['home', 'quiz', 'db'].forEach(p => document.getElementById('page-' + p).classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            if (id === 'db') this.renderList();
        }
    };
    app.init();
</script>
</body>
</html>
