<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字溫習系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f5f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            padding: 10px;
            border-radius: 8px;
            background: #f0f4f8;
        }

        .stat-box span {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #card {
            font-size: 2rem;
            margin: 2rem 0;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .definition {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
            display: none;
        }

        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .hidden { display: none; }
        
        #pos-tag {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home">
        <h1>日文溫習</h1>
        <div class="stats-grid">
            <div class="stat-box">
                <small>待複習</small>
                <span id="due-count">0</span>
            </div>
            <div class="stat-box">
                <small>已掌握 (Mastered)</small>
                <span id="master-count">0</span>
            </div>
        </div>
        <button id="btn-start" class="btn btn-primary" onclick="app.startSession()">開始溫習</button>
    </div>

    <div id="page-quiz" class="hidden">
        <div id="pos-tag"></div>
        <div id="card" onclick="app.reveal()">
            <div id="japanese-text"></div>
            <div id="definition-text" class="definition"></div>
        </div>
        <div id="quiz-controls" class="hidden">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-danger" onclick="app.handleResult(false)">唔識</button>
                <button class="btn btn-success" onclick="app.handleResult(true)">識喇</button>
            </div>
        </div>
        <p style="color: #999; font-size: 0.8rem; margin-top: 20px;">點擊單字顯示答案</p>
    </div>
</div>

<script>
    // 1. Supabase 配置 (請填寫你的 Key)
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        data: [],
        queue: [],
        currentIndex: 0,
        isRevealed: false,

        async init() {
            try {
                // 獲取所有資料
                const { data, error } = await _supabase
                    .from('vocab')
                    .select('*');

                if (error) throw error;

                // 數據清洗：確保 mastered 是布爾值
                this.data = data.map(item => ({
                    ...item,
                    mastered: String(item.mastered).toLowerCase() === 'true'
                }));

                this.updateUI();
            } catch (err) {
                console.error("初始化失敗:", err);
                alert("資料庫連線失敗，請檢查 API Key 或 RLS 設定。");
            }
        },

        updateUI() {
            const now = Date.now();
            
            // Mastered 功能核心邏輯：
            // 1. 待複習 = 未 mastered 且時間已到
            const dueTasks = this.data.filter(i => !i.mastered && (i.nextReview || 0) <= now);
            // 2. 已掌握 = mastered 屬性為 true 的總數
            const masteredCount = this.data.filter(i => i.mastered === true).length;

            document.getElementById('due-count').innerText = dueTasks.length;
            document.getElementById('master-count').innerText = masteredCount;
            document.getElementById('btn-start').disabled = dueTasks.length === 0;
        },

        startSession() {
            const now = Date.now();
            // 只抽樣「未掌握」且「到期」的字
            this.queue = this.data
                .filter(i => !i.mastered && (i.nextReview || 0) <= now)
                .sort(() => Math.random() - 0.5);

            if (this.queue.length > 0) {
                this.currentIndex = 0;
                this.showPage('quiz');
                this.loadCard();
            }
        },

        loadCard() {
            this.isRevealed = false;
            const cur = this.queue[this.currentIndex];
            document.getElementById('japanese-text').innerText = cur.japanese;
            document.getElementById('definition-text').innerText = cur.definition;
            document.getElementById('pos-tag').innerText = cur.pos || '單字';
            
            document.getElementById('definition-text').style.display = 'none';
            document.getElementById('quiz-controls').classList.add('hidden');
        },

        reveal() {
            this.isRevealed = true;
            document.getElementById('definition-text').style.display = 'block';
            document.getElementById('quiz-controls').classList.remove('hidden');
        },

        async handleResult(correct) {
            const cur = this.queue[this.currentIndex];
            
            if (correct) {
                // 答對邏輯
                cur.stage = (cur.stage || 0) + 1;
                // 如果連續答對到達 Stage 5，自動設為 Mastered
                if (cur.stage >= 5) {
                    cur.mastered = true;
                }
                // 簡單間隔重複：Stage 1=1日, 2=2日, 3=4日, 4=8日...
                const days = Math.pow(2, cur.stage - 1);
                cur.nextReview = Date.now() + (days * 86400000);
            } else {
                // 答錯重來
                cur.stage = 1;
                cur.mastered = false;
                cur.nextReview = Date.now();
            }

            // 同步回 Supabase
            const { error } = await _supabase
                .from('vocab')
                .update({ 
                    stage: cur.stage, 
                    nextReview: cur.nextReview, 
                    mastered: cur.mastered 
                })
                .eq('id', cur.id);

            if (error) console.error("同步失敗:", error);

            // 下一張或結束
            this.currentIndex++;
            if (this.currentIndex < this.queue.length) {
                this.loadCard();
            } else {
                alert("完成今次溫習！");
                this.showPage('home');
                this.init(); // 重新整理數據
            }
        },

        showPage(pageId) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-quiz').classList.add('hidden');
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
        }
    };

    // 啟動 App
    app.init();
</script>

</body>
</html>
