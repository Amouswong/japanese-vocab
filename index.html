<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese SRS - Stage 5 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .jp-text { font-family: 'Noto Sans JP', sans-serif; }
        .scene { perspective: 1000px; width: 100%; height: 350px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card__face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1rem; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card__face--back { background: #f8fafc; transform: rotateY(180deg); border: 2px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-indigo-600 text-white p-4 shadow-md z-10">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-torii-gate"></i> Nihongo SRS</h1>
            <nav class="flex gap-4 text-sm font-semibold">
                <button onclick="app.showPage('dashboard')">Home</button>
                <button onclick="app.showPage('list')">Database</button>
            </nav>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto w-full max-w-3xl mx-auto p-4">
        
        <div id="page-dashboard">
            <div class="bg-white rounded-xl p-6 shadow-sm border text-center mb-6">
                <h2 class="text-xl font-bold text-slate-500">Daily Reviews (Stages 1-4)</h2>
                <div class="text-6xl font-bold text-indigo-600 my-4" id="due-count">0</div>
                <button onclick="app.startSession('review')" id="btn-start" class="bg-indigo-600 text-white py-3 px-10 rounded-full font-bold shadow-lg disabled:opacity-50">Start Reviews</button>
            </div>

            <div class="bg-white rounded-xl p-6 border border-slate-200 text-center">
                <h3 class="font-bold text-slate-700">Mastery Refresh</h3>
                <p class="text-sm text-slate-500 mb-4">Randomly test 10 words from Stage 5</p>
                <button onclick="app.startSession('master')" id="btn-master" class="bg-indigo-100 text-indigo-700 py-2 px-6 rounded-full text-sm font-bold hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">
                    Test 10 Mastered Words
                </button>
                <div class="text-xs text-slate-400 mt-2">Total Mastered (Lv 5): <span id="master-count">0</span></div>
            </div>
        </div>

        <div id="page-list" class="hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-200">
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold">Vocabulary</h2>
                        <button onclick="app.exportJSON()" class="bg-green-600 text-white px-3 py-1.5 rounded text-xs font-bold shadow hover:bg-green-700">
                            <i class="fas fa-download"></i> Export JSON
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="search-input" oninput="app.renderList()" placeholder="Search..." class="flex-1 border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <select id="filter-level" onchange="app.renderList()" class="border rounded-lg px-2 py-2 text-sm outline-none">
                            <option value="all">All Levels</option>
                            <option value="1">Stage 1</option>
                            <option value="2">Stage 2</option>
                            <option value="3">Stage 3</option>
                            <option value="4">Stage 4</option>
                            <option value="5">Stage 5 (MAX)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="vocab-container" class="space-y-2 pb-10"></div>
        </div>

        <div id="page-review" class="hidden">
            <div class="flex justify-between items-center mb-2 px-1">
                <span id="session-title" class="font-bold text-indigo-600 uppercase text-xs tracking-widest">Reviewing</span>
                <span class="text-xs text-slate-400" id="progress-text">0/0</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-1.5 mb-6">
                <div id="progress-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all w-0"></div>
            </div>

            <div class="scene" onclick="app.flipCard()">
                <div class="card" id="flashcard">
                    <div class="card__face">
                        <h2 class="text-4xl font-bold jp-text text-center px-4" id="ui-front">...</h2>
                        <p class="text-slate-300 mt-4 text-xs">Tap to Flip</p>
                    </div>
                    <div class="card__face card__face--back">
                        <h2 class="text-2xl font-bold text-indigo-700 mb-2 text-center px-4" id="ui-back-main">...</h2>
                        <div class="flex gap-4 mt-10 w-full px-4">
                            <button onclick="app.handleResult(false, event)" class="flex-1 bg-red-100 text-red-700 font-bold py-4 rounded-xl">Forgot</button>
                            <button onclick="app.handleResult(true, event)" class="flex-1 bg-green-100 text-green-700 font-bold py-4 rounded-xl">Correct</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const app = {
            data: [],
            queue: [],
            currentIndex: 0,
            sessionType: 'review',

            async init() {
                try {
                    const response = await fetch('./vocab.json?t=' + Date.now());
                    if (response.ok) {
                        this.data = await response.json();
                    }
                } catch (e) {
                    const local = localStorage.getItem('jp_srs_storage');
                    if (local) this.data = JSON.parse(local);
                }
                this.updateUI();
                this.showPage('dashboard');
            },

            save() {
                localStorage.setItem('jp_srs_storage', JSON.stringify(this.data));
                this.updateUI();
            },

            updateUI() {
                const now = Date.now();
                const due = this.data.filter(i => (i.stage || 1) < 5 && (i.nextReview || 0) <= now).length;
                const mastered = this.data.filter(i => (i.stage || 1) >= 5).length;
                
                document.getElementById('due-count').innerText = due;
                document.getElementById('master-count').innerText = mastered;
                document.getElementById('btn-start').disabled = due === 0;
                document.getElementById('btn-master').disabled = mastered === 0;
            },

            showPage(id) {
                document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
                document.getElementById('page-' + id).classList.remove('hidden');
                if(id === 'list') this.renderList();
            },

            renderList() {
                const container = document.getElementById('vocab-container');
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const filterLevel = document.getElementById('filter-level').value;

                const filtered = this.data.filter(item => {
                    const textMatch = item.japanese.toLowerCase().includes(searchTerm) || 
                                    (item.definition || item.meaning || "").toLowerCase().includes(searchTerm);
                    const levelMatch = filterLevel === 'all' || (item.stage || 1).toString() === filterLevel;
                    return textMatch && levelMatch;
                });

                container.innerHTML = filtered.map(item => `
                    <div class="bg-white p-4 rounded-lg shadow-sm flex justify-between items-center border border-slate-200">
                        <div>
                            <div class="jp-text font-bold text-lg">${item.japanese}</div>
                            <div class="text-sm text-slate-500">${item.definition || item.meaning}</div>
                        </div>
                        <div class="text-xs font-bold px-3 py-1 rounded ${item.stage >= 5 ? 'bg-green-100 text-green-700' : 'bg-indigo-100 text-indigo-700'}">
                            STAGE ${item.stage || 1}
                        </div>
                    </div>
                `).join('');
            },

            startSession(type) {
                this.sessionType = type;
                const now = Date.now();
                
                if (type === 'review') {
                    document.getElementById('session-title').innerText = "Daily Review";
                    this.queue = this.data.filter(i => (i.stage || 1) < 5 && (i.nextReview || 0) <= now);
                } else {
                    document.getElementById('session-title').innerText = "Mastery Test";
                    const pool = this.data.filter(i => (i.stage || 1) >= 5);
                    this.queue = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
                }

                if (this.queue.length === 0) return;
                this.currentIndex = 0;
                this.showPage('review');
                this.loadCard();
            },

            loadCard() {
                const card = this.queue[this.currentIndex];
                document.getElementById('ui-front').innerText = card.japanese;
                document.getElementById('ui-back-main').innerText = card.definition || card.meaning;
                document.getElementById('flashcard').classList.remove('is-flipped');
                
                // Update Progress
                const progress = ((this.currentIndex) / this.queue.length) * 100;
                document.getElementById('progress-bar').style.width = progress + "%";
                document.getElementById('progress-text').innerText = `${this.currentIndex + 1} / ${this.queue.length}`;
            },

            flipCard() { document.getElementById('flashcard').classList.add('is-flipped'); },

            handleResult(correct, event) {
                event.stopPropagation();
                const currentCard = this.queue[this.currentIndex];
                const dataIndex = this.data.findIndex(i => i.japanese === currentCard.japanese);

                if (correct) {
                    if (this.sessionType === 'review') {
                        this.data[dataIndex].stage = (this.data[dataIndex].stage || 1) + 1;
                        const days = Math.pow(2, this.data[dataIndex].stage - 1);
                        this.data[dataIndex].nextReview = Date.now() + (days * 24 * 60 * 60 * 1000);
                    }
                } else {
                    // Logic: Drop back to Level 4 if a Level 5 word is missed
                    if (this.data[dataIndex].stage >= 5) {
                        this.data[dataIndex].stage = 4;
                        alert("Moved back to Stage 4 for review.");
                    } else {
                        this.data[dataIndex].stage = 1;
                    }
                    this.data[dataIndex].nextReview = Date.now();
                }

                this.save();
                this.currentIndex++;
                if (this.currentIndex >= this.queue.length) {
                    document.getElementById('progress-bar').style.width = "100%";
                    setTimeout(() => { alert("Session Complete!"); this.showPage('dashboard'); }, 300);
                } else {
                    this.loadCard();
                }
            },

            exportJSON() {
                const blob = new Blob([JSON.stringify(this.data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'vocab.json';
                a.click();
            }
        };

        app.init();
    </script>
</body>
</html>
